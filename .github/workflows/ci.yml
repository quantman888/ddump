name: Python 3.14 CI

on:
  pull_request:
    branches:
      - ddump_s3
  push:
    branches:
      - ddump_s3
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    name: Python 3.14 CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          set -euo pipefail
          python -X utf8 -m pip install --upgrade pip
          python -X utf8 -m pip install --upgrade ".[s3]"

      - name: Run tests
        run: python -X utf8 -m unittest discover -s tests -v
