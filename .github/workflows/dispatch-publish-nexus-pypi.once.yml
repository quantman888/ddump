name: "[TEMP] Dispatch Publish Nexus PyPI"

on:
  push:
    branches:
      - ddump_s3
    paths:
      - .github/workflows/dispatch-publish-nexus-pypi.once.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Dispatch publish-nexus-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/workflows/publish-nexus-pypi.yml/dispatches",
              data=json.dumps({"ref": "ddump_s3", "inputs": {"publish": "true"}}).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status != 204:
                      raise SystemExit(f"unexpected dispatch status: {response.status}")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(f"dispatch failed: HTTP {exc.code}: {body}")
          print("Dispatched publish-nexus-pypi.yml on ddump_s3.")
          PY
