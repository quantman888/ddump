name: "[MANUAL] Publish Nexus PyPI"

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built distributions to Nexus"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  require-ddump-s3:
    name: Require ddump_s3 branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "ddump_s3" ]]; then
            echo "publish-nexus-pypi.yml must run from ddump_s3, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  publish:
    name: Build and publish ddump
    needs: [require-ddump-s3]
    uses: quantman888/.github/.github/workflows/python-package-publish.reusable.yml@v1
    with:
      PYTHON_PACKAGE_REPOSITORY_URL: https://nexus.suz-k3s-01.000666.site/repository/pypi-hosted/
      PYTHON_PACKAGE_SIMPLE_URL: https://nexus.suz-k3s-01.000666.site/repository/pypi-hosted/simple/
      PYTHON_PUSH_PACKAGE: ${{ github.event.inputs.publish == 'true' }}
      PYTHON_SKIP_EXISTING: true
      PYTHON_VERSION: "3.14"
      PYTHON_TEST_COMMAND: |
        python -X utf8 -m pip install --upgrade ".[s3]"
        python -X utf8 -m unittest discover -s tests -v
      PYTHON_PRE_BUILD_COMMAND: |
        python -X utf8 <<'PY'
        import os
        import pathlib
        import re

        version_path = pathlib.Path("ddump/_version.py")
        text = version_path.read_text(encoding="utf-8")
        match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
        if not match:
          raise SystemExit("ddump/_version.py does not define __version__")

        base_version = match.group(1)
        stamp = os.popen("date -u +%Y%m%d").read().strip()
        run_number = os.environ["GITHUB_RUN_NUMBER"]
        run_attempt = os.environ["GITHUB_RUN_ATTEMPT"]
        publish_version = f"{base_version}.post{stamp}{run_number}{run_attempt}"
        version_path.write_text(f'__version__ = "{publish_version}"\n', encoding="utf-8")
        print(f"Using private Nexus version {publish_version}")
        PY
      INFISICAL_DOMAIN: https://key.000666.site
      INFISICAL_PROJECT_SLUG: quant
      INFISICAL_ENV_SLUG: prod
      INFISICAL_SECRET_PATH: /clusters/suz-k3s-01/runtime/nexus
      INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_DDUMP_PUBLISH_IDENTITY_ID }}
      INFISICAL_OIDC_AUDIENCE: https://github.com/quantman888
