name: "[AUTO] Sync Upstream"

on:
  pull_request:
    branches:
      - ddump_s3
  push:
    branches:
      - ddump_s3
  schedule:
    - cron: "17 19 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  python-ci:
    name: Python 3.14 CI
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          set -euo pipefail
          python -X utf8 -m pip install --upgrade pip
          python -X utf8 -m pip install --upgrade ".[s3]"

      - name: Run tests
        run: python -X utf8 -m unittest discover -s tests -v

  sync-main:
    name: Sync upstream main to fork main
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: quantman888/.github/.github/workflows/fork-sync.reusable.yml@v1
    with:
      target_branch: main
      upstream_repo: wukan1986/ddump
      upstream_branch: main
      force_reset: false
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      RUNNER_PROBE_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}

  open-sync-pr:
    name: Open main to ddump_s3 PR
    needs: [sync-main]
    if: ${{ needs.sync-main.result == 'success' }}
    uses: quantman888/.github/.github/workflows/branch-sync-pr.reusable.yml@v1
    with:
      source_branch: main
      target_branch: ddump_s3
      pr_title: "chore(sync): merge upstream main into ddump_s3"
      pr_body: "Automated upstream sync PR from clean mirror main into ddump_s3."
      auto_resolve_theirs_paths: ""
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      RUNNER_PROBE_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}

  enable-automerge:
    name: Enable auto-merge for sync PR
    needs: [open-sync-pr]
    if: ${{ needs.open-sync-pr.result == 'success' && needs.open-sync-pr.outputs.pr_url != '' }}
    uses: quantman888/.github/.github/workflows/automerge-pr.reusable.yml@v1
    with:
      pr_url: ${{ needs.open-sync-pr.outputs.pr_url }}
      expected_base_branch: ddump_s3
      expected_head_branch: main
      merge_method: merge
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
