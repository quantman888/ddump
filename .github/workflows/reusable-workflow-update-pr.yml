name: Reusable Workflow Update PR

on:
  repository_dispatch:
    types:
      - reusable-workflow-release
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Target reusable workflow ref (40-hex SHA or v* tag)"
        required: false
        type: string
      target_sha:
        description: "Target reusable workflow commit SHA (40 hex)"
        required: false
        type: string
      target_tag:
        description: "Target reusable workflow tag (v*)"
        required: false
        type: string
      reusable_repo:
        description: "Target reusable workflow repository (owner/repo)"
        required: false
        type: string
        default: "quantman888/.github"
      source_reusable_repo:
        description: "Legacy reusable workflow repository to migrate from"
        required: false
        type: string
        default: "quantman888/workflow-reusable"
      reusable_workflow_path:
        description: "Reusable workflow path. Empty updates all refs to quantman888/.github."
        required: false
        type: string
        default: ""
      source_repository:
        description: "Dispatch source repository"
        required: false
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: reusable-workflow-update-pr
  cancel-in-progress: false

jobs:
  update-reusable-workflow-ref:
    uses: quantman888/.github/.github/workflows/reusable-workflow-update-pr.reusable.yml@v1
    with:
      target_ref: ${{ github.event.inputs.target_ref || github.event.client_payload.target_ref || '' }}
      target_sha: ${{ github.event.inputs.target_sha || github.event.client_payload.target_sha || '' }}
      target_tag: ${{ github.event.inputs.target_tag || github.event.client_payload.target_tag || '' }}
      reusable_repo: ${{ github.event.inputs.reusable_repo || github.event.client_payload.reusable_repo || 'quantman888/.github' }}
      source_reusable_repo: ${{ github.event.inputs.source_reusable_repo || github.event.client_payload.source_reusable_repo || 'quantman888/workflow-reusable' }}
      reusable_workflow_path: ${{ github.event.inputs.reusable_workflow_path || github.event.client_payload.reusable_workflow_path || '' }}
      source_repository: ${{ github.event.inputs.source_repository || github.event.client_payload.source_repository || '' }}
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
