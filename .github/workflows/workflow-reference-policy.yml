name: Workflow Reference Policy

on:
  pull_request:
    branches:
      - ddump_s3
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/actions/**/action.yml"
      - ".github/actions/**/action.yaml"
  push:
    branches:
      - ddump_s3
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/actions/**/action.yml"
      - ".github/actions/**/action.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflow-references:
    uses: quantman888/.github/.github/workflows/workflow-reference-policy.yml@v1
